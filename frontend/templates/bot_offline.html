<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Нет соединения</title>
    <link rel="icon" type="image/x-icon" href="/static/img/favicon.ico"><link rel="icon" type="image/x-icon" href="/static/img/favicon.ico">
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="https://unpkg.com/feather-icons"></script>
</head>
<body class="centered-layout">
    
    <div class="card" style="width: 100%; max-width: 480px; text-align: center; padding: 50px 40px; border-color: rgba(239, 68, 68, 0.3);">
        
        <div style="margin-bottom: 30px;">
            <div style="width: 100px; height: 100px; background: rgba(239, 68, 68, 0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto; box-shadow: 0 0 40px rgba(239, 68, 68, 0.2); border: 1px solid rgba(239, 68, 68, 0.3); position: relative;">
                <i data-feather="wifi-off" style="width: 45px; height: 45px; color: #ef4444;"></i>
                
                <div style="position: absolute; top: 0; right: 0; width: 20px; height: 20px; background: #ef4444; border-radius: 50%; border: 3px solid #13111c;"></div>
            </div>
        </div>

        <h2 style="margin-bottom: 15px; font-weight: 700; color: #ef4444;">Потеряно соединение с ботом</h2>
        
        <p style="color: var(--text-muted); margin-bottom: 30px; line-height: 1.6;">
            Веб-панель не может получить данные от бота.<br>
            Возможно, бот перезагружается или выключен.
        </p>

        <div style="background: rgba(0,0,0,0.3); border-radius: 12px; padding: 15px; margin-bottom: 30px; border: 1px dashed var(--glass-border); text-align: left;">
            <div style="font-size: 0.8rem; color: #777; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 1px;">Код ошибки</div>
            <code style="font-family: 'JetBrains Mono', monospace; color: #ef4444;">WEBSOCKET_DISCONNECTED</code>
        </div>
        
        <div style="display: flex; gap: 15px;">
            <a href="/logout" class="btn-primary" style="background: rgba(255,255,255,0.05); color: #aaa; border: 1px solid var(--glass-border); box-shadow: none; flex: 1;">
                Выйти
            </a>
            <button onclick="window.location.href='/dashboard'" class="btn-primary" style="flex: 2;">
                <i data-feather="refresh-cw"></i> Попробовать снова
            </button>
        </div>
    </div>

    <script>feather.replace()</script>
</body>
</html>
