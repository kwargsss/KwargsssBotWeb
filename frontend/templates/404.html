<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Страница не найдена</title>
    <link rel="icon" type="image/x-icon" href="/static/img/favicon.ico">
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="https://unpkg.com/feather-icons"></script>
</head>
<body class="centered-layout">
    
    <div class="card" style="width: 100%; max-width: 450px; text-align: center; padding: 50px 40px;">
        
        <div style="margin-bottom: 30px; animation: float 3s ease-in-out infinite;">
            <div style="width: 100px; height: 100px; background: rgba(139, 92, 246, 0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto; box-shadow: 0 0 40px rgba(139, 92, 246, 0.2); border: 1px solid rgba(139, 92, 246, 0.3);">
                <i data-feather="compass" style="width: 50px; height: 50px; color: var(--primary);"></i>
            </div>
        </div>

        <h1 style="font-size: 4rem; font-weight: 800; line-height: 1; margin-bottom: 10px; background: linear-gradient(135deg, #fff 0%, #9ca3af 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">404</h1>
        
        <h2 style="margin-bottom: 15px; font-weight: 600;">Страница потерялась</h2>
        <p style="color: var(--text-muted); margin-bottom: 40px; line-height: 1.6;">
            Похоже, мы не можем найти то, что вы ищете.<br>
            Возможно, страница была удалена или перемещена.
        </p>
        
        <a href="/dashboard" class="btn-primary" style="width: 100%; text-decoration: none; justify-content: center;">
            <i data-feather="home"></i> Вернуться на главную
        </a>
    </div>

    <style>
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
    </style>

    <script>feather.replace()</script>
</body>
</html>
